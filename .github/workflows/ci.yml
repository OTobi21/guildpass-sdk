name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-and-test:
    name: Validate, Lint, Test & Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Package metadata validation ───────────────────────────────────────
      # publint checks for malformed exports, missing files, and other issues
      # that would break consumers of the published package.
      - name: Validate package metadata (publint)
        run: pnpm validate

      # ── Code quality ──────────────────────────────────────────────────────
      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm typecheck

      # ── Tests ─────────────────────────────────────────────────────────────
      - name: Run unit tests
        run: pnpm test:run

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build
        run: pnpm build

      # ── Smoke tests (require the built dist) ──────────────────────────────
      - name: Run smoke tests
        run: pnpm test:smoke
